<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeliard Level 1 - ASCII Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #ui {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: #0f0;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ui">
        Controls: <span class="key">Arrows</span> Move/Climb/Jump/Squat &nbsp;|&nbsp; <span class="key">&lt; &gt;</span> Jump left/right &nbsp;|&nbsp; <span class="key">Space</span> Use sword &nbsp;|&nbsp; <span class="key">Alt</span> Magics &nbsp;|&nbsp; <span class="key">Enter</span> Inventory
    </div>

    <div id="debug" style="margin-top: 10px; text-align: left; font-size: 14px; color: #0f0; font-family: monospace; width: 580px; margin-left: auto; margin-right: auto;">
        Debug:<br>
        FPS: 0<br>
        onGround: 0<br>
        squatting: 0<br>
        x: 0.000<br>
        y: 0.000<br>
        vx: 0.000<br>
        vy: 0.000
    </div>

// --- Engine Configuration ---
    const TILE_WIDTH = 20;
    const TILE_HEIGHT = 20;
    const VIEW_COLS = 29;
    const VIEW_ROWS = 18;

    // --- Setup Canvas ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = VIEW_COLS * TILE_WIDTH;
    canvas.height = VIEW_ROWS * TILE_HEIGHT;

    // --- Map Parsing ---
    let map = rawMapData.split('\n').filter(row => row.trim().length > 0 || row.length > 0);
    let mapWidth = 0;
    for (let row of map) {
        if (row.length > mapWidth) mapWidth = row.length;
    }
    // Pad rows to uniform width
    map = map.map(row => row.padEnd(mapWidth, ' '));
    const mapHeight = map.length;

    // --- Game State ---
    let lastTime = 0;
    let fps = 0;

    const player = {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        width: 0.99,
        // Height is ~3 tiles (2.9 allows sliding through 3-block gaps without friction)
        height: 2.99,
        normalHeight: 2.99,
        squatHeight: 1.99,
        onGround: false,
        onRope: false,
        climbing: false,
        squatting: false,
        jumpStartY: null  // Track Y position when leaving ground
    };

    const keys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
        Space: false,
        KeyZ: false,
        Alt: false
    };

    const keyTimers = {
        ArrowLeft: 0,
        ArrowRight: 0
    };

    // --- Utilities ---
    function wrap(n, max) {
        return ((n % max) + max) % max;
    }

    function getTile(x, y) {
        const wx = wrap(Math.floor(x), mapWidth);
        const wy = wrap(Math.floor(y), mapHeight);
        return map[wy][wx];
    }

    function isRope(char) {
        return char === '!' || char === '"';
    }

    function isPortal(char) {
        return '0123456789'.includes(char);
    }

    function isSolid(char) {
        if (!char) return false;
        return char !== ' ' && char !== '(' && !isRope(char) && !isPortal(char);
    }

    // --- Spawn Logic ---
    function spawn() {
        player.x = 62; // absolute position from the left of the map
        player.y = 72; // absolute position from the top of the map
    }
    spawn();

    // --- Input Handling ---
    window.addEventListener('keydown', e => {
        if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) 
            e.preventDefault();

        if(e.code === 'Space') keys.Space = true;
        if(e.code === 'AltLeft' || e.code === 'AltRight') keys.Alt = true;

        // Start timer for directional keys
        if(e.code === 'ArrowLeft' && !keys.ArrowLeft) {
            keys.ArrowLeft = true;
            keyTimers.ArrowLeft = 0;
        }
        if(e.code === 'ArrowRight' && !keys.ArrowRight) {
            keys.ArrowRight = true;
            keyTimers.ArrowRight = 0;
        }

        if(keys.hasOwnProperty(e.code)) keys[e.code] = true;
        if(keys.hasOwnProperty(e.key)) keys[e.key] = true; // Fallback
    });

    window.addEventListener('keyup', e => {
        if(e.code === 'Space') keys.Space = false;
        if(e.code === 'AltLeft' || e.code === 'AltRight') keys.Shift = false;
        if(keys.hasOwnProperty(e.code)) keys[e.code] = false;
        if(keys.hasOwnProperty(e.key)) keys[e.key] = false;

        // Reset timers on key release
        if(e.code === 'ArrowLeft') keyTimers.ArrowLeft = 0;
        if(e.code === 'ArrowRight') keyTimers.ArrowRight = 0;
    });

    // --- Physics Update ---
    function update() {
        const speed = 0.06;
        const jumpForce = -0.126;
        const gravity = 0.004;
        const climbSpeed = 0.05;
        const friction = 0.75;
        const keyDelay = 0.05; // 50ms delay before movement starts

        // 1. ROPE LOGIC (rope is held near head)
        // Check the tile at the "Head" position (player.y + 0.5)
        const headX = player.x + player.width / 2;
        const headY = player.y + 0.5;
        const tileAtHead = getTile(headX, headY);
        const touchingRope = isRope(tileAtHead);

        if (touchingRope) {
            player.onRope = true;
        } else {
            player.onRope = false;
            player.climbing = false;
        }

        // Horizontal Movement with delay
        // Update key timers
        if (keys.ArrowLeft) keyTimers.ArrowLeft += 1/60; // Assuming 60 FPS
        if (keys.ArrowRight) keyTimers.ArrowRight += 1/60;

        // Only apply movement if key has been held long enough
        if (keys.ArrowLeft && keyTimers.ArrowLeft >= keyDelay) {
            player.vx -= speed * 0.5;
        }
        if (keys.ArrowRight && keyTimers.ArrowRight >= keyDelay) {
            player.vx += speed * 0.5;
        }

        player.vx *= friction;
        if (Math.abs(player.vx) < 0.001) player.vx = 0;

        // Vertical Movement
        const jump = keys.ArrowUp;

        if (player.onRope) {
            if (keys.ArrowUp || keys.ArrowDown) player.climbing = true;

            if (player.climbing) {
                player.vy = 0;
                if (keys.ArrowUp) player.vy = -climbSpeed;
                if (keys.ArrowDown) player.vy = climbSpeed;
            }

            if (jump && !player.jumpLocked) {
                player.vy = jumpForce;
                player.climbing = false;
                player.jumpLocked = true;
            }
        } else {
            // Only apply gravity if not on ground
            if (!player.onGround) {
                player.vy += gravity;
            }

            // Can jump from ground (not while squatting)
            if (player.onGround && jump && !player.jumpLocked && !player.squatting) {
                player.vy = jumpForce;
                player.onGround = false; // Immediately leave ground to enable repeated jumps
                player.jumpLocked = true;
            }
        }
        if (!jump) player.jumpLocked = false;

        // 3. COLLISION
        let nextX = player.x + player.vx;
        if (checkCollision(nextX, player.y)) {
            player.vx = 0;
        } else {
            player.x = nextX;
        }

        let nextY = player.y + player.vy;
        const wouldCollide = checkCollision(player.x, nextY);

        if (wouldCollide) {
            if (player.vy > 0) {
                const wasInAir = !player.onGround;
                player.onGround = true;
                // Snap feet to floor
                const floorTileY = Math.floor(nextY + player.height);
                player.y = floorTileY - player.height;

                // If we just landed, mark for camera update
                if (wasInAir && player.jumpStartY !== null) {
                    player.justLanded = true;
                }

                // Unlock jump when landing to enable continuous jumping
                player.jumpLocked = false;
            } else if (player.vy < 0) {
                player.vy = 0;
                player.y = Math.ceil(player.y); // Bonk head, nudge down
            }
            player.vy = 0;
        } else {
            // Record jump start position when leaving ground
            if (player.onGround && !player.onRope) {
                player.jumpStartY = player.y;
            }
            player.y = nextY;
            player.onGround = false;
        }

        // Extra check: if we're stationary vertically, check if there's actually ground beneath us
        // If not, we need to start falling (walking off a ledge)
        if (Math.abs(player.vy) < 0.001 && !player.onRope) {
            const groundCheck = checkCollision(player.x, player.y + 0.1);
            if (groundCheck) {
                player.onGround = true;
            } else {
                // No ground beneath, start falling
                player.onGround = false;
                if (player.jumpStartY === null) {
                    player.jumpStartY = player.y;
                }
                // Give a small downward velocity to initiate falling
                player.vy = 0.001;
            }
        }

        // 4. SQUAT LOGIC (after collision detection)
        // Cancel squat if moving horizontally
        const isMovingHorizontally = keys.ArrowLeft || keys.ArrowRight;
        if (keys.ArrowDown && player.onGround && !player.onRope && !isMovingHorizontally) {
            player.squatting = true;
        } else {
            player.squatting = false;
        }

        // 5. WRAPPING
        if (player.x < 0) player.x += mapWidth;
        if (player.x >= mapWidth) player.x -= mapWidth;
        if (player.y < 0) player.y += mapHeight;
        if (player.y >= mapHeight) player.y -= mapHeight;
    }

    function checkCollision(targetX, targetY) {
        const eps = 0.05; 
        const left = targetX + eps;
        const right = targetX + player.width - eps;
        
        // Loop vertically to check Head, Body, and Legs for collisions
        // We check every 0.9 tiles to ensure we don't skip over a block
        for(let h = 0; h <= player.height; h += 0.9) {
            let checkY = targetY + h;
            // Ensure we check the very bottom edge on the last pass
            if(h > player.height - eps) checkY = targetY + player.height - eps;

            if (isSolid(getTile(left, checkY)) || isSolid(getTile(right, checkY))) {
                return true;
            }
        }
        // One final check at the exact bottom to be safe
        if (isSolid(getTile(left, targetY + player.height - eps)) || 
            isSolid(getTile(right, targetY + player.height - eps))) {
            return true;
        }

        return false;
    }

    // --- Rendering ---
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Press Start 2P is naturally very wide, almost square.
        ctx.font = `${TILE_HEIGHT}px "Press Start 2P", monospace`;
        ctx.textBaseline = 'top';

        // Camera Logic
        // Horizontal camera always follows player
        const camX = player.x - (VIEW_COLS / 2);

        // Vertical camera logic
        const playerCenterY = player.y + (player.normalHeight / 2);
        if (!window.camY) window.camY = playerCenterY - (VIEW_ROWS / 2) - 2;

        // Update camera when:
        // 1. Actively climbing rope
        if (player.onRope && player.climbing) {
            window.camY = playerCenterY - (VIEW_ROWS / 2) - 2;
        }
        // // 2. In air and falling (vy > 0 means falling down, regardless of jump start position)
        // else if (!player.onGround && !player.onRope && player.vy > 0.01) {
        //     window.camY = playerCenterY - (VIEW_ROWS / 2) - 2;
        // }
        // 3. In air and below jump start position (fell below starting level)
        else if (!player.onGround && !player.onRope && player.jumpStartY !== null && player.y > player.jumpStartY) {
            window.camY = playerCenterY - (VIEW_ROWS / 2) - 2;
        }
        // 4. Just landed from a jump (to handle landing on higher ground)
        else if (player.justLanded) {
            window.camY = playerCenterY - (VIEW_ROWS / 2) - 2;
            player.justLanded = false;
            player.jumpStartY = null;
        }
        // 5. Reset jumpStartY when on ground
        if (player.onGround) {
            player.jumpStartY = null;
        }

        const camY = window.camY;

        // Draw Map
        for (let ry = 0; ry < VIEW_ROWS; ry++) {
            for (let rx = 0; rx < VIEW_COLS; rx++) {
                const mapX = rx + Math.floor(camX);
                const mapY = ry + Math.floor(camY);
                const char = getTile(mapX, mapY);
                if (char === ' ') continue;

                if (isPortal(char)) ctx.fillStyle = '#f0f';
                else if (isSolid(char)) ctx.fillStyle = '#aaa';
                else if (isRope(char)) ctx.fillStyle = '#d60';
                else ctx.fillStyle = '#555'; // non-solid decorations

                ctx.fillText(char, rx * TILE_WIDTH, ry * TILE_HEIGHT);
            }
        }

        // Draw Hero (3 Vertical Characters in normal mode, 2 in squat mode)
        ctx.fillStyle = '#0f0';
        const screenX = (player.x - camX) * TILE_WIDTH;
        const screenY = (player.y - camY) * TILE_HEIGHT;

        if (player.squatting) {
            // Squat mode: 2 characters
            ctx.fillText('@', screenX + TILE_WIDTH * 0.5, screenY + TILE_HEIGHT * 1.5);
            ctx.fillText('A', screenX + TILE_WIDTH * 0.5, screenY + TILE_HEIGHT * 2.5);
        } else {
            // Normal mode: 3 characters
            ctx.fillText('@', screenX + TILE_WIDTH * 0.5, screenY + TILE_HEIGHT * 0.5);
            ctx.fillText('+', screenX + TILE_WIDTH * 0.5, screenY + TILE_HEIGHT * 1.5);
            ctx.fillText('Λ', screenX + TILE_WIDTH * 0.5, screenY + TILE_HEIGHT * 2.5);
        }

        // Update debug info in HTML (use 1/0 instead of true/false)
        document.getElementById('debug')
            .innerHTML = `Debug:<br>
                FPS: ${fps}<br>
                onGround: ${player.onGround ? 1 : 0}<br>
                squatting: ${player.squatting ? 1 : 0}<br>
                x: ${player.x.toFixed(3)}<br>
                y: ${player.y.toFixed(3)}<br>
                vx: ${player.vx.toFixed(3)}<br>
                vy: ${player.vy.toFixed(3)}`;
    }

    function loop(timestamp) {
        const dt = timestamp - lastTime;
        lastTime = timestamp;
        if (dt > 0) {
            fps = Math.round(1000 / dt);
        }
        update(); //updates the world state
        draw(); //draws the current world state
        requestAnimationFrame(loop); // syncs with display refresh rate
    }

    requestAnimationFrame(loop);
/*
Modes:
    1. Normal - on ground, not moving
    2. Squat - on ground, not moving, camera not moving
    3. Jump - starts on ground at y0, (can have vx > 0). 
        y decreases until 2 tiles up, then starts falling (camera not follows).
        If collision with ground at y <= y0, end the jump and center camera.
        If y > y0, camera starts following player down (falling the pit).
        In the rising phase of the jump (vy <= 0), if hero crosses the rope and presses Climb (up arrow), jump mode ends and rope mode starts, camera centered on player.
    4. Rope - on ground, if rope appears at the head, press Climb (rope mode starts). 
        Camera follows.
        If hero moves off the rope (left/right), rope mode ends and fall starts. 
        If another rope appears, hero hangs on rope and rope mode starts.
    5. Move - on ground. If falls off a ledge, fall mode starts. Camera follows.
*/
</script>
</body>
</html>
