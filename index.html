<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeliard Level 1 - ASCII Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="ui">
    <span class="group">Controls:</span>&nbsp;&nbsp;<span class="key">Arrows</span> Move / Climb / Jump / Squat<br>
    <span class="key">Space</span> Use sword &nbsp; <span class="key">Alt</span> Magics &nbsp; <span class="key">Enter</span> Inventory
  </div>

  <div id="layout-wrapper" style="display: flex; align-items: flex-start; justify-content: center; width: 100%; max-width: 1200px;">

    <div id="debug" style="font-size: 14px; color: #0f0; font-family: monospace; width: 200px; padding-right: 20px;">
    </div>

    <div id="game-wrapper" style="display: flex; flex-direction: column; width: fit-content;">
      <div id="game-container">
          <canvas id="gameCanvas"></canvas>
      </div>

      <div class="zeliard-hud">
        <div class="stats-panel">
          
          <div class="hud-row life-row">
            <span class="label">LIFE</span>
            <div class="life-bar-container">
              <div class="life-fill life-fill-max"></div>
              <div class="life-fill life-fill-current"></div>
              <div class="ticks"></div>
            </div>
          </div>

          <div class="hud-row place-row">
            <span class="label">PLACE</span>
            <span class="value" id="currentMapName"></span>
          </div>

          <div class="hud-row split-row">
            <div class="currency-box">
              <span class="label">GOLD</span>
              <span class="value" id="gold">0</span>
            </div>
            <div class="currency-box">
              <span class="label label-almas">ALMAS</span>
              <span class="value" id="almas">0</span>
            </div>
          </div>
        </div>

        <div class="inventory-panel">
          <div class="slot-wrapper">
            <div class="slot active-slot" id="activeSwordSlot"></div>
          </div>

          <div class="slot-wrapper">
            <div class="slot" id="activeMagicSlot"></div>
            <div class="slot-counter" id="spellCounter"></div>
          </div>
          <div class="slot-wrapper">
            <div class="slot" id="activeShieldSlot"></div>
            <div class="slot-counter" id="shieldHp"></div>
          </div>
        </div>
      </div>

    </div>

    <div style="width: 200px;"></div>
  </div>

  <script src="game.js" type="module"></script>
</body>
</html>
