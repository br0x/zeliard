<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeliard Level 1 - ASCII Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="layout-wrapper" style="display: flex; align-items: flex-start; justify-content: center; width: 100%; max-width: 1200px;">

        <div id="debug" style="font-size: 14px; color: #0f0; font-family: monospace; width: 200px; padding-right: 20px;">
            Debug:<br>
            FPS: 0<br>
            onGround: 0<br>
            squatting: 0<br>
            jumpStartY: null<br>
            jumpLocked: 0<br>
            isHighJump: 0<br>
            isLowCeiling: 0<br>
            yMin: null<br>
            slippery: 0<br>
            climbing: 0<br>
            x: 0.000<br>
            y: 0.000<br>
            vx: 0.000<br>
            vy: 0.000
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div style="width: 200px;"></div>
    </div>

    <div id="ui">
        Controls: <span class="key">Arrows</span> Move/Climb/Jump/Squat &nbsp;|&nbsp; <span class="key">&lt; &gt;</span> Jump left/right &nbsp;|&nbsp; <span class="key">Space</span> Use sword &nbsp;|&nbsp; <span class="key">Alt</span> Magics &nbsp;|&nbsp; <span class="key">Enter</span> Inventory
    </div>

    <script src="map.js"></script>
    <script src="game.js"></script>
</body>
</html>
