<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zeliard Web Port</title>
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="intro-screen" class="intro-screen">
    <canvas id="introCanvas" width="640" height="400" aria-label="Opening title"></canvas>
  </section>

  <div id="fps-display">FPS: <span id="fps-value">0</span></div>
  <div id="ui" class="hidden">
    <span class="group">Controls:</span>&nbsp;&nbsp;
    <span class="key">⬅⬆➡⬇</span> Move/Climb/Jump/Squat&nbsp;&nbsp;
    <span class="key">Space</span> Hit/Action&nbsp;&nbsp;
    <span class="key">Alt</span> Magics &nbsp;&nbsp;
    <span class="key">Enter</span> Inventory<br>
    <span class="key">F1</span> Music On/Off&nbsp;&nbsp;
    <span class="key">F2</span> Sound FX On/Off&nbsp;&nbsp;
    <span class="key">F7</span> Restore/Restart&nbsp;&nbsp;
    <span class="key">F8</span> Import/Export&nbsp;&nbsp;
    <span class="key">F9</span> Change Speed&nbsp;&nbsp;
  </div>

  <div id="layout-wrapper" class="hidden" style="display: flex; align-items: flex-start; justify-content: center; width: 100%; max-width: 1200px;">

    <!-- <div id="debug" style="font-size: 14px; color: #0f0; font-family: monospace; width: 200px; padding-right: 20px;">
    </div> -->
    <div style="width: 200px;"></div>

    <img src="assets/images/mole/mole_l.jpg" style="width: 64px; height: 600px;">
    <div id="game-wrapper" style="display: flex; flex-direction: column; width: fit-content;">
      <img src="assets/images/mole/mole_t.jpg" style="width: 672px; height: 42px;">
      <div id="game-container">
          <canvas id="gameCanvas"></canvas>
      </div>

      <div class="zeliard-hud">
        <div class="stats-panel">
          
          <div class="hud-row life-row"> <!-- Life -->
            <span class="label">LIFE</span>
            <div class="life-bar-container">
              <div class="life-fill life-fill-max"></div>
              <div class="life-fill life-fill-current"></div>
              <div class="ticks"></div>
            </div>
          </div>

          <div class="hud-row place-row"> <!-- Place / Enemy HP -->
            <span class="label" id="placeLabel">PLACE</span>
            <span class="value" id="currentMapName"></span>
          </div>

          <div class="hud-row split-row"> <!-- Gold / Almas -->
            <div class="currency-box"> <!-- gold -->
              <span class="label">GOLD</span>
              <span class="value" id="gold">0</span>
            </div>
            <div class="currency-box"> <!-- almas -->
              <span class="label label-almas">ALMAS</span>
              <span class="value" id="almas">0</span>
            </div>
          </div>
        </div>

        <div class="inventory-panel">
          <div class="slot-wrapper"> <!-- sword -->
            <div class="slot active-slot" id="activeSwordSlot"><img id="activeSwordIcon" /></div>
          </div>
          <div class="slot-wrapper"> <!-- magic -->
            <div class="slot" id="activeMagicSlot"><img id="activeSpellIcon" /></div>
            <div class="slot-counter" id="spellCounter"></div>
          </div>
          <div class="slot-wrapper"> <!-- shield -->
            <div class="slot" id="activeShieldSlot"><img id="activeShieldIcon" /></div>
            <div class="slot-counter" id="shieldHp"></div>
          </div>
        </div>
      </div>

    </div>
    <img src="assets/images/mole/mole_r.jpg" style="width: 64px; height: 600px;">

    <div style="width: 200px;"></div>
  </div>

  <script src="game.js" type="module"></script>
</body>
</html>
